<script>
const nombresBebidas = {{ nombres_bebidas | tojson }};

// Contadores independientes por contenedor — nunca se repiten aunque se eliminen filas
const contadores = {};

function getContador(key) {
  if (!contadores[key]) contadores[key] = 0;
  return ++contadores[key];
}

function agregarPlato(dia, tipo) {
  const key = `${tipo}s-${dia}`;
  const contenedor = document.getElementById(key);
  const idx = Date.now(); // timestamp como índice único, nunca colisiona
  const row = document.createElement('div');
  row.className = 'plato-input-row';
  row.innerHTML = `
    <input type="text" name="${tipo}_${dia}_${idx}" class="form-control" placeholder="Nuevo plato...">
    <button type="button" class="btn-quitar" onclick="this.parentElement.remove()">✕</button>
  `;
  contenedor.appendChild(row);
  row.querySelector('input').focus();
}

function agregarBebida(dia) {
  const contenedor = document.getElementById(`bebidas-${dia}`);
  const idx = Date.now();
  const opts = nombresBebidas.map(n => `<option value="${n}">${n}</option>`).join('');
  const row = document.createElement('div');
  row.className = 'bebida-select-row';
  row.innerHTML = `
    <select name="bebida_${dia}_${idx}" class="form-control">${opts}</select>
    <button type="button" class="btn-quitar" onclick="this.parentElement.remove()">✕</button>
  `;
  contenedor.appendChild(row);
}
</script>
